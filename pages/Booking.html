<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Now | PulseForge</title>
    <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/dark-mode.css" />
    <link rel="stylesheet" href="../assets/css/rtl.css" />
    <script defer src="../assets/js/main.js"></script>
  </head>
  <body class="booking-page">
    <section class="coming-soon-page">
      <div class="container">
        <a class="brand booking-brand" href="HomePage-1.html" aria-label="PulseForge home">
          <span class="brand__mark">
            <i class="fa-solid fa-dumbbell" aria-hidden="true"></i>
          </span>
          <span class="brand__copy">
            <strong>PulseForge</strong>
            <small>Performance Coaching</small>
          </span>
        </a>

        <div class="coming-soon-wrapper">
          <div class="coming-soon__visual">
            <div class="coming-soon-glow"></div>
            <h1>Book Now</h1>
          </div>

          <div class="coming-soon__content">
            <span class="section-kicker">Book A Session</span>
            <h2>Reserve Your Coaching Session</h2>
            <p>
              Tell us your training goals and preferred schedule. We will connect you with the right
              coach and confirm your session details.
            </p>

            <div class="coming-soon__form booking-actions">
              <a class="button button--primary" href="contact.html#contact-form">Go to Booking Form</a>
              <a class="button button--outline" href="pricing.html">View Pricing</a>
            </div>
            <p class="booking-page__redirect">
              Prefer to explore first?
              <a href="HomePage-1.html">Back to Home</a>
            </p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
